---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-catalog
  labels:
    app: service-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-catalog
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: service-catalog
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: service-catalog
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx1g -XX:+UseZGC -XX:MaxRAMPercentage=80.0"
            - name: POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: HOST
            - name: POSTGRESQL_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: PORT
            - name: POSTGRESQL_DB
              valueFrom:
                secretKeyRef:
                  name: service-catalog
                  key: POSTGRESQL_DB
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: service-catalog
                  key: POSTGRESQL_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: service-catalog
                  key: POSTGRESQL_PASSWORD
            - name: KEYCLOAK_OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: KEYCLOAK_OIDC_ISSUER
            - name: SERVICE_CATALOG_URI
              valueFrom:
                secretKeyRef:
                  name: commonurl
                  key: SERVICE_CATALOG_BASE_URI
            - name: CORS_ORIGIN_PATTERNS
              valueFrom:
                secretKeyRef:
                  name: service-catalog
                  key: CORS_ORIGIN_PATTERNS
          image: service-catalog
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
          resources:
            requests:
              memory: 1000Mi
